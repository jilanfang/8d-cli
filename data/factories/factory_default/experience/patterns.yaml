    frequency: high
    hit_count: 5
    typical_causes:
      - cause: 回流温度过冲
        confidence: 0.8
      - cause: 锡膏来料问题
        confidence: 0.3
    escape_point_patterns:
      - location: OQC
        typical_reason: 目视检验无法发现微小裂纹
    investigation_order:
      - 先查工艺参数
      - 再查来料

  - phenomenon_type: USB接口无输出
    frequency: medium
    hit_count: 3
    typical_causes:
      - cause: 焊点开裂
        confidence: 0.7
      - cause: 连接器来料不良
        confidence: 0.4
